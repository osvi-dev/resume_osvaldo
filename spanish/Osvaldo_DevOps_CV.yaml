  sections:
    Resumen:
      - Ingeniero en Sistemas Computacionales con experiencia en DevOps, Infraestructura y MLOps. Con experiencia en el diseño e implementación de arquitecturas de monitoreo y observabilidad en tiempo real, automatización de infraestructura mediante pipelines CI/CD en Jenkins mediante pipeline bajo el paradigma de GitOps y administración segura de clústeres de Kubernetes. Enfocado en la alta disponibilidad de servicios, la entrega continua bajo la metodología GitOps.
